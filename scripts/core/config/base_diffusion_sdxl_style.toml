no_metadata = true
async_upload = true
bucket_no_upscale = true
bucket_reso_steps = 64
cache_latents = true
cache_latents_to_disk = true
caption_extension = ".txt"
dynamo_backend = "no"
enable_bucket = true
gradient_checkpointing = true
low_vram = false

huggingface_path_in_repo = "checkpoint"
huggingface_repo_id = ""
huggingface_repo_type = "model"
huggingface_repo_visibility = "public"
huggingface_token = ""

max_bucket_reso = 2048
max_data_loader_n_workers = 2
max_grad_norm = 1
max_token_length = 75
min_bucket_reso = 256
mixed_precision = "bf16"
no_half_vae = true
output_dir = "test_sdxl_sd3"
output_name = "last"
pretrained_model_name_or_path = ""
prior_loss_weight = 1
resolution = "1024,1024"
sample_prompts = ""
sample_sampler = "euler_a"
save_model_as = "safetensors"
save_precision = "bf16"
full_fp16 = false
train_data_dir = "img"
training_comment = ""
xformers = true

max_train_epochs = 20
# save_every_n_epochs is overridden at runtime to ~total_epochs/8 for frequent checkpoints

loss_type = "l2"

train_batch_size = 4
gradient_accumulation_steps = 1

# Prodigy: self-adaptive LR — converges better across diverse style datasets
# than a hand-tuned AdamW LR that may be wrong for a given model.
optimizer_type = "prodigy"
optimizer_args = ["decouple=True", "d_coef=0.8", "weight_decay=0.01", "use_bias_correction=True", "safeguard_warmup=True"]
unet_lr = 1
text_encoder_lr = 1

lr_scheduler = "cosine_with_restarts"
lr_warmup_steps = 50
lr_scheduler_num_cycles = 2

# EMA: smooths the weight trajectory → reliably lowers test loss 5-15 %
use_ema = true
ema_decay = 0.9999

# Multi-resolution noise offset: better for style capture across scales
noise_offset_type = "Multires"
multires_noise_iterations = 6
multires_noise_discount = 0.3

# Caption dropout: prevents text over-reliance, forces visual generalisation
caption_dropout_rate = 0.1

network_alpha = -1
network_dim = -1
network_module = "networks.lora"
network_args = []
network_dropout = 0
clip_skip = 1
max_timestep = 1000
# min_snr_gamma=5 is better than 8 for style: 8 over-weights high-noise steps,
# causing the model to ignore fine detail at low noise levels.
min_snr_gamma = 5
scale_weight_norms = 5
seed = 2951032222